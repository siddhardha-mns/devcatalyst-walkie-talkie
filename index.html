<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0a0d08" />
  <title>DevCatalyst — Walkie Talkie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --bg: #0a0a0c;
      --surface: #121217;
      --panel: #181820;
      --border: #2d2d3a;
      --accent: #6366f1; /* Indigo */
      --accent-dim: #312e81;
      --accent-glow: rgba(99, 102, 241, 0.15);
      --amber: #f59e0b;
      --red: #ef4444;
      --text: #f8fafc;
      --text-dim: #94a3b8;
      --font-main: 'Inter', sans-serif;
      --font-display: 'Orbitron', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* Modern subtle noise */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 998;
      opacity: 0.5;
    }

    /* === SCREENS === */
    .screen { display: none; width: 100%; max-width: 420px; padding: 24px 16px; }
    .screen.active { display: flex; flex-direction: column; gap: 20px; }

    /* === JOIN SCREEN === */
    .logo {
      text-align: center;
      padding: 40px 0 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .logo img {
      width: 120px;
      height: auto;
      filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
    }
    .logo-title {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }
    .logo-sub {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 5px;
      text-transform: uppercase;
      font-weight: 500;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      position: relative;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
    }
    .panel::before {
      content: attr(data-label);
      position: absolute;
      top: -10px;
      left: 20px;
      background: var(--accent);
      color: white;
      padding: 2px 10px;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 1.5px;
      border-radius: 4px;
      text-transform: uppercase;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    input[type="text"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-main);
      font-size: 15px;
      padding: 14px 16px;
      outline: none;
      transition: all 0.2s;
    }
    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    input[type="text"]::placeholder { color: #475569; }

    .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .btn-primary {
      width: 100%;
      padding: 18px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: var(--font-main);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
    }
    .btn-primary:hover {
      background: #4f46e5;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
    }
    .btn-primary:active { transform: translateY(0); }

    .error-msg {
      color: var(--red);
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      min-height: 18px;
    }

    /* === MAIN APP SCREEN === */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 18px;
      background: rgba(18, 18, 23, 0.8);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      backdrop-filter: blur(10px);
    }
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
      animation: pulse 2s infinite;
    }
    .dot.offline { background: var(--red); box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); animation: none; }
    .dot.busy { background: var(--amber); box-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }

    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.9); }
    }

    /* Display panel */
    .display-panel {
      background: linear-gradient(135deg, #1e1e2d 0%, #121217 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      min-height: 130px;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
    }
    .display-panel::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    }

    .channel-display {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--accent);
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    .channel-name {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .member-count {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      background: rgba(255,255,255,0.05);
      padding: 4px 10px;
      border-radius: 6px;
      margin-top: 12px;
    }

    /* Transmission log */
    .tx-log {
      position: absolute;
      bottom: 16px;
      right: 20px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      opacity: 0.6;
    }

    /* Signal bars */
    .signal-bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 20px;
    }
    .bar {
      width: 4px;
      background: var(--border);
      border-radius: 1px;
      transition: all 0.3s;
    }
    .bar:nth-child(1) { height: 5px; }
    .bar:nth-child(2) { height: 8px; }
    .bar:nth-child(3) { height: 12px; }
    .bar:nth-child(4) { height: 16px; }
    .bar:nth-child(5) { height: 20px; }
    .bar.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

    /* Speaker display */
    .speaker-display {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 20px;
      min-height: 72px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .speaker-display.speaking {
      border-color: var(--accent);
      background: rgba(99, 102, 241, 0.05);
      box-shadow: 0 0 30px rgba(99, 102, 241, 0.15);
    }

    .speaker-icon {
      font-size: 28px;
      background: var(--surface);
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .speaker-info {
      flex: 1;
      overflow: hidden;
    }
    .speaker-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .speaker-name {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 4px;
    }
    .speaker-name.active { color: var(--accent); }
    .speaker-name.idle { color: var(--text-dim); }

    /* Waveform */
    .waveform-wrap {
      width: 60px;
      height: 32px;
      flex-shrink: 0;
      opacity: 0.5;
    }
    #waveform { display: block; filter: drop-shadow(0 0 5px var(--accent)); }

    /* PTT Button */
    .ptt-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 12px 0;
    }

    .ptt-outer {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2d2d3a 0%, #121217 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .ptt-outer::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), transparent, var(--accent));
      z-index: -1;
      opacity: 0.3;
      animation: rotate 4s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    #ptt-btn {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #312e81, #1e1b4b);
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      user-select: none;
      transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      -webkit-user-select: none;
      touch-action: none;
      box-shadow: 
        0 15px 35px rgba(0,0,0,0.4),
        inset 0 2px 4px rgba(255,255,255,0.1);
    }
    #ptt-btn:hover { transform: scale(1.02); }

    #ptt-btn.pressed {
      background: radial-gradient(circle at 35% 35%, #4f46e5, #312e81);
      box-shadow: 
        0 5px 15px rgba(0,0,0,0.4),
        0 0 50px rgba(99, 102, 241, 0.4),
        inset 0 4px 8px rgba(0,0,0,0.3);
      transform: scale(0.95);
    }

    .ptt-icon { font-size: 52px; transition: transform 0.2s; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
    #ptt-btn.pressed .ptt-icon { transform: scale(1.1); }

    .ptt-label {
      font-weight: 800;
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
    }
    #ptt-btn.pressed .ptt-label { color: white; }

    .ptt-hint {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dim);
      letter-spacing: 1px;
    }
    .ptt-hint span { color: var(--accent); font-weight: 700; }

    /* Volume meter */
    .vol-meter {
      width: 100%;
      height: 8px;
      background: var(--surface);
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    #vol-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6366f1, #a855f7);
      border-radius: 4px;
      transition: width 0.05s;
    }

    /* Action bar */
    .action-bar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .btn-secondary {
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-dim);
      font-family: var(--font-main);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--text); background: var(--surface); }
    .btn-secondary.active { border-color: var(--accent); color: var(--accent); background: rgba(99, 102, 241, 0.05); }
    .btn-secondary.danger:hover { border-color: var(--red); color: var(--red); }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      z-index: 1000;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>

  <!-- JOIN SCREEN -->
  <div id="join-screen" class="screen active">
    <div class="logo">
      <img src="assets/logo.png" alt="DevCatalyst Logo" />

    <div class="panel" data-label="IDENTIFICATION">
      <label>Callsign / Username</label>
      <input type="text" id="username" placeholder="eg. DeveloperOne" maxlength="20" autocomplete="off" />

    <div class="panel" data-label="NETWORK">

        <div>
          <label>Room Name</label>
          <input type="text" id="room-id" placeholder="Main" maxlength="20" autocomplete="off" />

        <div>
          <label>Access Code</label>

        </div>
      </div>

    <div class="error-msg" id="join-error"></div>

<!-- MAIN APP SCREEN -->
<div id="app-screen" class="screen">

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-indicator">
      <div class="dot" id="conn-dot"></div>
      <span id="conn-label">CONNECTING</span>
    </div>
    <div class="signal-bars" id="signal-bars">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  </div>

  <!-- Channel display -->
  <div class="display-panel">
    <div class="channel-display">ACTIVE CHANNEL</div>
    <div class="channel-name" id="channel-name">———</div>
    <div class="member-count" id="member-count">MEMBERS: —</div>
    <div class="tx-log" id="tx-log">AWAITING TX</div>
  </div>

  <!-- Who's speaking -->
  <div class="speaker-display" id="speaker-display">
    <div class="speaker-icon">📻</div>
    <div class="speaker-info">
      <div class="speaker-label">ACTIVE SPEAKER</div>
      <div class="speaker-name idle" id="speaker-name">CHANNEL CLEAR</div>
    </div>
    <div class="waveform-wrap">
      <canvas id="waveform" width="60" height="32"></canvas>
    </div>
  </div>

  <!-- Volume meter -->
  <div class="vol-meter"><div id="vol-bar"></div></div>

  <!-- PTT -->
  <div class="ptt-wrap">
    <div class="ptt-outer">
      <button id="ptt-btn"
        onmousedown="startPTT()"
        onmouseup="stopPTT()"
        onmouseleave="stopPTT()"
        ontouchstart="startPTT(event)"
        ontouchend="stopPTT(event)">
        <div class="ptt-icon">🎙️</div>
        <div class="ptt-label">PUSH TO TALK</div>
      </button>
    </div>
    <div class="ptt-hint">HOLD <span>PTT</span> TO TRANSMIT · RELEASE TO END</div>
  </div>

  <!-- Action bar -->
  <div class="action-bar">
    <button class="btn-secondary" id="mute-btn" onclick="toggleMute()">🔇 MUTE OUTPUT</button>
    <button class="btn-secondary danger" onclick="leaveRoom()">↩ LEAVE CHANNEL</button>
  </div>

</div>

<!-- Toast notification -->
<div id="toast"></div>

<script>
// =============================================
// CONFIG — update SERVER_URL before deploying
// =============================================
// For local development, this is window.location.origin
// For production, this is your Render backend URL
const SERVER_URL = "https://devcatalyst-walkie-talkie.onrender.com"; 

// =============================================
// STATE
// =============================================
let socket = null;
let myUsername = '';
let myRoom = '';
let isSpeaking = false;
let isMuted = false;
let isConnected = false;

// Audio
let audioCtx = null;
let mediaStream = null;
let mediaRecorder = null;
let keepAliveOscillator = null;
let audioQueue = [];
let isPlaying = false;
let analyserNode = null;
let micAnalyserNode = null;
let animFrameId = null;

// Service worker
let swRegistration = null;

// =============================================
// SERVICE WORKER
// =============================================
async function registerSW() {
  if ('serviceWorker' in navigator) {
    try {
      swRegistration = await navigator.serviceWorker.register('/sw.js');
      console.log('[SW] Registered');
    } catch (e) {
      console.warn('[SW] Failed:', e);
    }
  }
}

// =============================================
// AUDIO CONTEXT — background keep-alive trick
// =============================================
function initAudioContext() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'interactive' });

  // Silent oscillator — tricks browser into keeping audio context alive in background
  keepAliveOscillator = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  gainNode.gain.value = 0.00001; // near-silent
  keepAliveOscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  keepAliveOscillator.start();

  // Waveform analyser for incoming audio
  analyserNode = audioCtx.createAnalyser();
  analyserNode.fftSize = 64;
  analyserNode.connect(audioCtx.destination);

  drawWaveform();
}

function resumeAudioCtx() {
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

// =============================================
// WAVEFORM CANVAS
// =============================================
const waveCanvas = document.getElementById('waveform');
const waveCtx = waveCanvas.getContext('2d');

function drawWaveform() {
  animFrameId = requestAnimationFrame(drawWaveform);
  if (!analyserNode) return;

  const bufferLen = analyserNode.frequencyBinCount;
  const dataArr = new Uint8Array(bufferLen);
  analyserNode.getByteTimeDomainData(dataArr);

  waveCtx.clearRect(0, 0, 60, 32);

  const isActive = document.getElementById('speaker-display').classList.contains('speaking');
  waveCtx.strokeStyle = isActive ? '#6366f1' : '#2d2d3a';
  waveCtx.lineWidth = 2;
  waveCtx.beginPath();

  const sliceWidth = 60 / bufferLen;
  let x = 0;
  for (let i = 0; i < bufferLen; i++) {
    const v = dataArr[i] / 128.0;
    const y = (v * 32) / 2;
    i === 0 ? waveCtx.moveTo(x, y) : waveCtx.lineTo(x, y);
    x += sliceWidth;
  }
  waveCtx.lineTo(60, 16);
  waveCtx.stroke();
}

// =============================================
// MIC VOLUME METER
// =============================================
function startVolumeMeter(stream) {
  if (!audioCtx) return;
  micAnalyserNode = audioCtx.createAnalyser();
  micAnalyserNode.fftSize = 256;
  const src = audioCtx.createMediaStreamSource(stream);
  src.connect(micAnalyserNode);

  const volData = new Uint8Array(micAnalyserNode.frequencyBinCount);
  const volBar = document.getElementById('vol-bar');

  function updateVol() {
    if (!isSpeaking) { volBar.style.width = '0%'; return; }
    requestAnimationFrame(updateVol);
    micAnalyserNode.getByteFrequencyData(volData);
    const avg = volData.reduce((a, b) => a + b, 0) / volData.length;
    volBar.style.width = Math.min(100, (avg / 128) * 100 * 2.5) + '%';
  }
  updateVol();
}

// =============================================
// AUDIO PLAYBACK — queue incoming Opus/chunks
// =============================================
function enqueueAudioChunk(arrayBuffer) {
  audioQueue.push(arrayBuffer);
  if (!isPlaying) playNextChunk();
}

function playNextChunk() {
  if (audioQueue.length === 0) { isPlaying = false; return; }
  isPlaying = true;
  const chunk = audioQueue.shift();

  resumeAudioCtx();

  audioCtx.decodeAudioData(chunk.slice(0), (buffer) => {
    const src = audioCtx.createBufferSource();
    src.buffer = buffer;
    src.connect(analyserNode);

    if (!isMuted) src.connect(audioCtx.destination);

    src.onended = playNextChunk;
    src.start(0);
  }, (err) => {
    console.warn('[Audio] decode error', err);
    playNextChunk();
  });
}

// =============================================
// PTT — Push To Talk
// =============================================
async function startPTT(e) {
  if (e) e.preventDefault();
  if (isSpeaking || !isConnected) return;

  resumeAudioCtx();

  // Request mic
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
        channelCount: 1,
        sampleRate: 16000,
      }
    });
  } catch (err) {
    showToast('🚫 MICROPHONE ACCESS DENIED');
    return;
  }

  // Tell server we want to speak
  socket.emit('ptt-start');
}

function startRecording() {
  if (!mediaStream) return;

  isSpeaking = true;
  document.getElementById('ptt-btn').classList.add('pressed');
  startVolumeMeter(mediaStream);

  // Choose best codec
  const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
    ? 'audio/webm;codecs=opus'
    : MediaRecorder.isTypeSupported('audio/ogg;codecs=opus')
      ? 'audio/ogg;codecs=opus'
      : 'audio/webm';

  mediaRecorder = new MediaRecorder(mediaStream, {
    mimeType,
    audioBitsPerSecond: 16000,
  });

  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0 && socket && isConnected) {
      e.data.arrayBuffer().then((buf) => {
        socket.emit('audio-chunk', { chunk: buf, roomId: myRoom });
      });
    }
  };

  mediaRecorder.start(150); // 150ms chunks
}

function stopPTT(e) {
  if (e) e.preventDefault();
  if (!isSpeaking) return;

  isSpeaking = false;
  document.getElementById('ptt-btn').classList.remove('pressed');
  document.getElementById('vol-bar').style.width = '0%';

  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  if (mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());
    mediaStream = null;
  }

  socket.emit('ptt-stop');
}

// =============================================
// JOIN / LEAVE
// =============================================
async function joinRoom() {
  const username = document.getElementById('username').value.trim().toUpperCase() || 'ANON';
  const roomId = document.getElementById('room-id').value.trim().toUpperCase() || 'GENERAL';
  const errEl = document.getElementById('join-error');

  errEl.textContent = '';
  if (!username) { errEl.textContent = '⚠ CALLSIGN REQUIRED'; return; }
  if (!roomId)   { errEl.textContent = '⚠ ROOM ID REQUIRED'; return; }

  myUsername = username;
  myRoom = roomId;

  // Register SW & init audio
  await registerSW();
  initAudioContext();

  // Connect socket
  connectSocket();

  // Switch screens
  document.getElementById('join-screen').classList.remove('active');
  document.getElementById('app-screen').classList.add('active');
  document.getElementById('channel-name').textContent = roomId;

  // Request notification permission
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function leaveRoom() {
  stopPTT();
  if (socket) socket.disconnect();
  document.getElementById('app-screen').classList.remove('active');
  document.getElementById('join-screen').classList.add('active');
  setConnStatus(false);
  document.getElementById('speaker-name').textContent = 'CHANNEL CLEAR';
  document.getElementById('speaker-name').className = 'speaker-name idle';
  document.getElementById('speaker-display').classList.remove('speaking', 'denied');
}

function toggleMute() {
  isMuted = !isMuted;
  const btn = document.getElementById('mute-btn');
  btn.classList.toggle('active', isMuted);
  btn.textContent = isMuted ? '🔇 MUTED' : '🔇 MUTE OUTPUT';
  showToast(isMuted ? '🔇 OUTPUT MUTED' : '🔊 OUTPUT ACTIVE');
}

// =============================================
// SOCKET
// =============================================
function connectSocket() {
  socket = io(SERVER_URL, { transports: ['websocket'] });

  socket.on('connect', () => {
    isConnected = true;
    setConnStatus(true);
    socket.emit('join-room', { roomId: myRoom, username: myUsername });
    animateBars(true);
  });

  socket.on('disconnect', () => {
    isConnected = false;
    setConnStatus(false);
    animateBars(false);
    stopPTT();
  });

  socket.on('joined', ({ socketId }) => {
    showToast(`✅ CONNECTED · ${myRoom}`);
  });

  socket.on('room-update', ({ memberCount }) => {
    document.getElementById('member-count').textContent = `MEMBERS: ${memberCount}`;
  });

  socket.on('speaker-active', ({ id, username }) => {
    const speakerDisplay = document.getElementById('speaker-display');
    const speakerName = document.getElementById('speaker-name');
    const txLog = document.getElementById('tx-log');

    speakerDisplay.classList.add('speaking');
    speakerDisplay.classList.remove('denied');
    speakerName.textContent = id === socket.id ? `${username} (YOU)` : username;
    speakerName.className = 'speaker-name active';
    txLog.textContent = 'RX ●';

    // If it's me, start recording
    if (id === socket.id) startRecording();

    // Notify SW for background notification
    if (id !== socket.id && swRegistration?.active) {
      const channel = new MessageChannel();
      swRegistration.active.postMessage({ type: 'AUDIO_NOTIFY', username }, [channel.port2]);
    }
  });

  socket.on('speaker-idle', () => {
    document.getElementById('speaker-display').classList.remove('speaking', 'denied');
    document.getElementById('speaker-name').textContent = 'CHANNEL CLEAR';
    document.getElementById('speaker-name').className = 'speaker-name idle';
    document.getElementById('tx-log').textContent = 'AWAITING TX';
  });

  socket.on('ptt-denied', ({ reason }) => {
    const btn = document.getElementById('ptt-btn');
    const speakerDisplay = document.getElementById('speaker-display');
    btn.classList.add('denied');
    speakerDisplay.classList.add('denied');
    showToast(`⛔ ${reason.toUpperCase()}`);
    setTimeout(() => {
      btn.classList.remove('denied');
      speakerDisplay.classList.remove('denied');
    }, 600);

    // Clean up mic
    if (mediaStream) {
      mediaStream.getTracks().forEach(t => t.stop());
      mediaStream = null;
    }
  });

  socket.on('audio-chunk', ({ chunk }) => {
    enqueueAudioChunk(chunk);
  });
}

// =============================================
// UI HELPERS
// =============================================
function setConnStatus(online) {
  const dot = document.getElementById('conn-dot');
  const label = document.getElementById('conn-label');
  dot.className = 'dot' + (online ? '' : ' offline');
  label.textContent = online ? `${myUsername} · ONLINE` : 'DISCONNECTED';
}

function animateBars(active) {
  const bars = document.querySelectorAll('.bar');
  bars.forEach((b, i) => {
    setTimeout(() => b.classList.toggle('active', active), i * 80);
  });
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// Keep audio ctx alive when page is visible
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) resumeAudioCtx();
});

// Prevent double-tap zoom on PTT
document.getElementById('ptt-btn')?.addEventListener('touchend', e => e.preventDefault(), { passive: false });

// Space bar PTT
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && e.target.tagName !== 'INPUT' && !isSpeaking) {
    e.preventDefault();
    startPTT();
  }
});
document.addEventListener('keyup', (e) => {
  if (e.code === 'Space' && isSpeaking) {
    e.preventDefault();
    stopPTT();
  }
});
</script>
